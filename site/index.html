<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DLG FIFA World Cup Pickems</title>
    <link rel="stylesheet" href="assets/styles.css">
  </head>
  <body data-page="home">
    <header class="site-header">
      <nav class="nav-shell" aria-label="Primary navigation">
        <a class="brand" href="index.html">DLG Pickems</a>
        <div class="nav-links">
          <a aria-current="page" href="index.html">Home</a>
          <a href="leaderboard.html">Leaderboard</a>
        </div>
      </nav>
    </header>

    <main>
      <section class="hero">
        <img class="hero-image" src="assets/hero-stadium.png" alt="">
        <div class="hero-shade"></div>
        <div class="hero-content">
          <p class="eyebrow">2026 Tournament Bracket Pool</p>
          <h1>DLG FIFA World Cup Pickems</h1>
          <div class="update-pill" id="last-updated">Loading latest standings</div>
        </div>
      </section>

      <section class="section-shell podium-section" aria-labelledby="top-three-heading">
        <div class="section-heading">
          <h2 id="top-three-heading">Top 3 Participants</h2>
          <a class="text-link" href="leaderboard.html">Full leaderboard</a>
        </div>
        <div class="podium-grid" id="top-three"></div>
      </section>

      <section class="section-shell bracket-section" aria-labelledby="bracket-heading">
        <div class="section-heading">
          <div>
            <h2 id="bracket-heading">Official Tournament Bracket</h2>
            <p id="bracket-source" class="muted"></p>
          </div>
        </div>
        <div class="bracket-scroll" aria-live="polite">
          <div class="bracket-grid" id="bracket"></div>
        </div>
      </section>
    </main>

    <script src="assets/app.js"></script>
  </body>
</html>
