name: Update Pickems Site

on:
  schedule:
    - cron: "18 10 * * *"
    - cron: "30 21 28 6 *"
    - cron: "30 19 29 6 *"
    - cron: "0 23 29 6 *"
    - cron: "30 3 30 6 *"
    - cron: "30 19 30 6 *"
    - cron: "30 23 30 6 *"
    - cron: "30 3 1 7 *"
    - cron: "30 18 1 7 *"
    - cron: "30 22 1 7 *"
    - cron: "30 2 2 7 *"
    - cron: "30 21 2 7 *"
    - cron: "30 1 3 7 *"
    - cron: "30 5 3 7 *"
    - cron: "30 20 3 7 *"
    - cron: "30 0 4 7 *"
    - cron: "0 4 4 7 *"
    - cron: "30 19 4 7 *"
    - cron: "30 23 4 7 *"
    - cron: "30 22 5 7 *"
    - cron: "30 2 6 7 *"
    - cron: "30 21 6 7 *"
    - cron: "30 2 7 7 *"
    - cron: "30 18 7 7 *"
    - cron: "30 22 7 7 *"
    - cron: "30 22 9 7 *"
    - cron: "30 21 10 7 *"
    - cron: "30 23 11 7 *"
    - cron: "30 3 12 7 *"
    - cron: "30 21 14 7 *"
    - cron: "30 21 15 7 *"
    - cron: "30 21 19 7 *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Regenerate site data
        run: python scripts/update_site_data.py

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
